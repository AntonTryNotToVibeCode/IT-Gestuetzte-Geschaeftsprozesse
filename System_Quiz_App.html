<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BSI Quiz App v3</title>
<style>
:root {
  --bg:#0b1020; --bg2:#0d1430; --panel:#121933; --panel2:#1a2345; --text:#edf2ff; --muted:#aeb8d4;
  --accent:#7aa2ff; --good:#27c281; --bad:#ff6b6b; --border:#2b376b;
}
body.light {
  --bg:#f5f7fb; --bg2:#e9eef9; --panel:#ffffff; --panel2:#eef2fb; --text:#182033; --muted:#5f6b85;
  --accent:#4b74ff; --good:#1f9d68; --bad:#d94b4b; --border:#d8dfef;
}
* { box-sizing:border-box; }
body {
  margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:linear-gradient(180deg,var(--bg),var(--bg2)); color:var(--text);
}
.wrap { max-width:1200px; margin:0 auto; padding:24px; display:flex; flex-direction:column; }
.wrap > .card:nth-child(3) { max-width:980px; margin-left:auto; margin-right:auto; width:100%; }
#controlsSection { display:block; }
#controlsSection.hidden { display:none; }
#controlsSection .controls { display:grid; gap:12px; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); align-items:end; }
.card {
  background:rgba(18,25,51,.92);
  border:1px solid var(--border); border-radius:18px; padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.18); margin-top:8px;
}
body.light .card { background:rgba(255,255,255,.92); }
h1 { margin:0 0 8px; font-size:1.8rem; }
.muted { color:var(--muted); }
.control label { display:block; margin-bottom:6px; color:var(--muted); }
.control input,.control select {
  width:100%; background:var(--panel2); border:1px solid var(--border); color:var(--text);
  border-radius:12px; padding:10px 12px;
}
.row,.status,.footer { display:flex; gap:10px; flex-wrap:wrap; }
.status { gap:14px; margin-top:12px; color:var(--muted); }
button {
  background:var(--accent); color:white; border:0; padding:10px 14px; border-radius:12px; cursor:pointer; font-weight:700;
}
button.secondary { background:transparent; color:var(--text); border:1px solid var(--border); }
.question { font-size:1.6rem; line-height:1.5; margin:4px 0 18px; }
.answers { display:grid; gap:10px; }
.answer {
  border:1px solid var(--border); background:var(--panel2); border-radius:14px; padding:12px 14px;
  cursor:pointer; display:flex; gap:12px; align-items:flex-start;
}
.answer input { margin-top:4px; transform:scale(1.15); }
.answer.correct { border-color:rgba(39,194,129,.6); background:rgba(39,194,129,.12); }
.answer.wrong { border-color:rgba(255,107,107,.65); background:rgba(255,107,107,.12); }
.pill {
  display:inline-flex; align-items:center; gap:8px;
  padding:6px 10px; border-radius:999px; background:var(--panel2); border:1px solid var(--border); color:var(--muted);
}
.hidden { display:none; }
.progress {
  height:10px; background:var(--panel2); border-radius:999px; overflow:hidden; margin-top:10px; border:1px solid var(--border);
}
.progress > div { height:100%; width:0; background:var(--accent); transition:width .25s ease; }
.result { font-size:1.1rem; margin-top:8px; }
.small { font-size:.92rem; }

/* Modal Styles */
.modal {
  position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center;
  z-index:9999;
}
.modal.hidden { display:none; }
.modal-content {
  background:var(--bg); border:2px solid var(--accent); border-radius:12px;
  padding:24px; max-width:600px; width:90%; max-height:80vh; overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
.modal-content h3 {
  margin:0 0 20px 0; color:var(--accent); text-align:center; font-size:1.3rem;
}
.modal-section {
  margin-bottom:20px;
}
.modal-section h4 {
  margin:0 0 10px 0; font-size:0.95rem; color:var(--text);
}
#exportArea, #importArea {
  width:100%; height:200px; padding:12px; border:1px solid var(--border);
  background:var(--panel); color:var(--text); border-radius:6px;
  font-family:monospace; font-size:0.85rem; resize:vertical;
  box-sizing:border-box; margin-bottom:10px;
}
#exportArea:focus, #importArea:focus { outline:none; border-color:var(--accent); }
.modal-btn {
  padding:10px 16px; margin:5px 5px 5px 0; border:none;
  background:var(--accent); color:white; border-radius:6px;
  cursor:pointer; font-size:0.9rem; transition:background 0.2s;
}
.modal-btn:hover { background:var(--accent-hover,var(--accent)); opacity:0.85; }
.modal-btn.close { background:#888; }
.modal-btn.close:hover { background:#666; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Klausurtrainer IT-Management</h1>
    <div class="status">
      <span class="pill">Fragen: <strong id="totalCount"></strong></span>
      <span class="pill">Richtig: <strong id="correctCount">0</strong></span>
      <span class="pill">Falsch: <strong id="wrongCount">0</strong></span>
      <span class="pill">Offene Wiederholungen: <strong id="dueCount">0</strong></span>
      <span class="pill">Gesehen: <strong id="uniqueCount">0 / 0</strong></span>
    </div>
  </div>

  <div class="card" id="controlsCard">
    <button id="toggleControls" class="secondary" style="margin-bottom:12px; width:100%;">⚙️ Einstellungen ein-/ausblenden</button>
    <div id="controlsSection">
      <div class="controls">
        <div class="control"><label for="search">Suche</label><input id="search" type="text" placeholder="Stichwort in Frage oder Antwort"></div>
        <div class="control"><label for="mode">Modus</label><select id="mode"><option value="all">Alle Fragen</option><option value="single">Nur Einfachauswahl</option><option value="multi">Nur Mehrfachauswahl</option></select></div>
        <div class="control"><label for="limit">Anzahl</label><select id="limit"><option value="0">Alle</option><option value="10">10</option><option value="20" selected>20</option><option value="50">50</option><option value="100">100</option></select></div>
        <div class="control"><label for="order">Reihenfolge</label><select id="order"><option value="random" selected>Zufällig (nach Schwierigkeit)</option><option value="true_random">Prüfungssimulation (echt zufällig)</option><option value="normal">Original</option><option value="new">neue Fragen</option><option value="retry">Fehlerhafte Fragen</option></select></div>
      </div>
      <div class="row" style="margin-top:14px">
        <button id="startBtn">Quiz starten</button>
        <button class="secondary" id="restartBtn">Neu mischen</button>
        <button class="secondary" id="revealBtn">Lösung zeigen</button>
        <button class="secondary" id="themeBtn">Hellmodus</button>
        <button class="secondary" id="importExportBtn">Import/Export</button>
      </div>
      <div class="row" style="margin-top:10px">
        <label class="pill"><input type="checkbox" id="repeatWrongToggle" checked> Falsche Fragen wiederholen</label>
        <label class="pill"><input type="checkbox" id="spacedWrongToggle" checked> Wiederholung nach 3 Fragen</label>
      </div>
    </div>
    <div class="progress"><div id="bar"></div></div>
    <div class="result" id="result"></div>
  </div>

  <div class="card">
    <div class="small muted" id="meta"></div>
    <div class="question" id="question">Klicke auf „Quiz starten“.</div>
    <div class="answers" id="answers"></div>
    <div class="footer">
      <button id="checkBtn" class="hidden">Prüfen</button>
      <button id="nextBtn" class="hidden">Nächste Frage</button>
    </div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [{"question": "Ein Verfahrensregister ist...", "answers": ["...eine Sammlung der maßgeblichen Datenschutzvorschriften.", "...einer Zusammenstellung aller Geschäftsprozesse einer Institution.", "...eine Zusammenstellung der Verfahren, in denen personenbezogene Daten erhoben, verarbeitet oder gespeichert werden.", "...eine Zusammenstellung der Verfahren für die Durchführung von Risikoanalysen einer Institution."], "solution": [0, 0, 1, 0]}, {"question": "Welche Daten muss der Anbieter eines Newsletters von Interessenten anfordern, wenn er dem Gebot der Datensparsamkeit/Datenminimierung genügen will?", "answers": ["Ihren Vor- und Nachnamen", "Ihr Geschlecht", "Ihre E-Mail-Adresse", "Ihren Wohnort"], "solution": [0, 0, 1, 0]}, {"question": "Die Befugnis des Einzelnen, grundsätzlich selbst über die Preisgabe und Verwendung seiner persönlichen Daten zu bestimmen, bezeichnet man als...", "answers": ["...Meinungsfreiheit.", "...informationelles Selbstbestimmungsrecht.", "...Grundrecht auf Vertraulichkeit.", "...Recht auf Privatsphäre."], "solution": [0, 1, 0, 0]}, {"question": "Die Befugnis des Einzelnen, grundsätzlich selbst über die Preisgabe und Verwendung seiner persönlichen Daten zu bestimmen, bezeichnet man als...", "answers": ["...Meinungsfreiheit.", "...Grundrecht auf Schutz der sie betreffenden personenbezogenen Daten.", "...Grundrecht auf Vertraulichkeit.", "...Recht auf Berufsfreiheit."], "solution": [0, 1, 0, 0]}, {"question": "Anliegen des Datenschutzes ist...", "answers": ["...der Schutz vertraulicher Daten.", "...der Schutz aller gespeicherten Daten.", "...der Schutz personenbezogener Daten.", "...der Schutz personenbezogener und sonstiger vertraulicher Daten.", "...der Schutz des Rechts auf informationelle Selbstbestimmung."], "solution": [0, 0, 1, 0, 1]}, {"question": "Anliegen des Datenschutzes ist...", "answers": ["...der Schutz vertraulicher Daten.", "...der Schutz aller gespeicherten Daten.", "...der Schutz personenbezogener Daten.  Bundes, die Daten verarbeiten.", "...für nicht-öffentliche Einrichtungen, die personenbezogene Daten verarbeiten.", "...für Unternehmen nur dann, wenn sie mehr als zehn Mitarbeiter beschäftigen.", "...nicht für Einrichtungen des Gesundheitswesens, da diese einer eigenen Datenschutzgesetzgebung unterworfen sind."], "solution": [1, 1, 0, 0]}, {"question": "Wenn ein Unternehmen oder eine Behörde in einem Internet-Formular personenbezogene Daten erhebt, muss sie...", "answers": ["...in einer Datenschutzerklärung darauf hinweisen, zu welchem Zweck sie diese Erhebung vornimmt.", "...dem Benutzer Gelegenheit geben, sein Einverständnis zu der Verwendung der Daten zu geben.", "...den Umfang der erhobenen Daten auf das Notwendige beschränken."], "solution": [1, 1, 1]}, {"question": "Die Weitergabe personenbezogener Daten an Dritte ist...", "answers": ["...nicht zulässig.", "...immer zulässig, wenn es dafür eine gesetzliche Grundlage gibt.", "...immer zulässig, wenn die Betroffenen eingewilligt haben.", "...immer zulässig, wenn sie zur Aufgabenerfüllung notwendig ist."], "solution": [0, 1, 1, 0]}, {"question": "Die Weitergabe personenbezogener Daten an Dritte ist...", "answers": ["...nicht zulässig.", "...zulässig, wenn es dafür eine gesetzliche Grundlage gibt.", "...zulässig, wenn die betroffenen Personen eingewilligt haben.", "...immer zulässig, wenn sie zu Marketingzwecken notwendig ist."], "solution": [0, 1, 1, 0]}, {"question": "Die Datenschutz-Grundverordnung gilt...", "answers": ["...für alle öffentlichen Einrichtungen des Bundes, die personenbezogene Daten verarbeiten.", "...für nicht-öffentliche Einrichtungen, die personenbezogene Daten verarbeiten.", "...für Unternehmen nur dann, wenn sie mehr als zehn Mitarbeiter beschäftigen.", "...nicht für Einrichtungen des Gesundheitswesens, da diese einer eigenen Datenschutzgesetzgebung unterworfen sind."], "solution": [1, 1, 0, 0]}, {"question": "Die Löschung oder Einschränkung der Verarbeitung personenbezogener Daten ist rec els.totalCount.textContent = ALL_QUESTIONS.length;

let quiz = [];
let queue = [];
let currentItem = null;
let shownCount = 0;
let correct = 0;
let wrong = 0;
let wrongStats = new Map();
let quizStatistics = new Map(); // { questionKey -> {timesShown, timesCorrect, timesWrong} }

function qKey(item) {
  return item.question + "||" + item.answers.join("||");
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function dueCount() {
  return queue.filter(item => {
    const s = wrongStats.get(qKey(item));
    return s && s.dueAt <= shownCount;
  }).length;
}

// localStorage Persistence für Statistiken
function saveStatistics() {
  try {
    localStorage.setItem('quizStatistics_v3', JSON.stringify(Array.from(quizStatistics.entries())));
  } catch (e) {
    console.error('Failed to save statistics:', e);
  }
}

function loadStatistics() {
  try {
    const data = localStorage.getItem('quizStatistics_v3');
    if (data) {
      quizStatistics = new Map(JSON.parse(data));
    }
  } catch (e) {
    console.error('Failed to load statistics:', e);
    quizStatistics = new Map();
  }
}

// Anti-Clustering: Speichert zuletzt gezeigte Fragen
const recentlyShown = [];
const RECENT_WINDOW = 5;

function getTopicFingerprint(item) {
  return item.question.toLowerCase().split(/\s+/).slice(0, 4).join(' ');
}

// Intelligente Ranking-Funktion mit starker Gewichtung nach Erfolgsquote
function calculateQuestionScore(item, penalizeRecent) {
  const key = qKey(item);
  const stats = quizStatistics.get(key) || {timesShown: 0, timesCorrect: 0, timesWrong: 0};
  const timesShown = stats.timesShown || 0;
  const timesCorrect = stats.timesCorrect || 0;
  const successRate = timesShown > 0 ? timesCorrect / timesShown : null;

  // Nie gezeigte Fragen: hoher Basis-Score (Neuheitsfaktor)
  if (timesShown === 0) return 4.0;

  // --- Kern: exponentiell schlechtere Fragen bekommen viel mehr Gewicht ---
  // successRate 0%  → difficultyFactor = 2^2  = 4.0  (sehr schlecht → sehr oft)
  // successRate 25% → difficultyFactor ≈ 2^1.5 ≈ 2.8
  // successRate 50% → difficultyFactor = 2^1  = 2.0
  // successRate 75% → difficultyFactor ≈ 2^0.5 ≈ 1.4
  // successRate 100%→ difficultyFactor = 2^0  = 1.0  (sehr gut → kaum noch)
  // Kurve durch (1.0→0.1) und (0.75→2): f(x) = 0.1 * 160000^(1-x)
  // 100%→0.1, 75%→2, 50%→40000, 0%→16000000000 (wird durch Gesamtgewicht normiert)
  const difficultyFactor = 0.1 * Math.pow(160000, 1 - successRate);

  // Seltenheits-Bonus: Fragen, die seltener gezeigt wurden, leicht bevorzugen
  const allStats = Array.from(quizStatistics.values());
  const maxShown = allStats.length > 0 ? Math.max(...allStats.map(s => s.timesShown || 1)) : 1;
  const rarityBonus = maxShown > 1 ? (maxShown - timesShown) / maxShown * 0.5 : 0;

  let score = difficultyFactor + rarityBonus;

  // Anti-Clustering: exakt dieselbe Frage kürzlich → fast ausblenden
  // Ähnliches Thema (erste 3 Wörter gleich) → stark abwerten
  if (penalizeRecent && recentlyShown.length > 0) {
    const fp = getTopicFingerprint(item);
    if (recentlyShown.some(r => qKey(r) === key)) {
      score *= 0.05;
    } else if (recentlyShown.some(r =>
      getTopicFingerprint(r).split(' ').slice(0, 3).join(' ') ===
      fp.split(' ').slice(0, 3).join(' '))) {
      score *= 0.3;
    }
  }
  return Math.max(score, 0.01);
}

// Weighted Random Selection – Queue ist bereits geshuffelt,
// daher löst Gleichstand (Score 3.0 für alle neuen Fragen)
// per Zufall auf, nicht nach Original-Reihenfolge
function selectNextWeightedQuestion(queueToSelect) {
  if (queueToSelect.length === 0) return null;

  const penalize = queueToSelect.length > RECENT_WINDOW;
  const scoredItems = queueToSelect.map(item => ({
    item,
    score: calculateQuestionScore(item, penalize)
  }));
  const totalScore = scoredItems.reduce((sum, s) => sum + s.score, 0);
  const weights = scoredItems.map(s => s.score / totalScore);

  let rand = Math.random();
  let cumulative = 0;
  let chosen = null;
  for (let i = 0; i < weights.length; i++) {
    cumulative += weights[i];
    if (rand <= cumulative) {
      chosen = queueToSelect.splice(i, 1)[0];
      break;
    }
  }
  if (!chosen) chosen = queueToSelect.splice(0, 1)[0];

  recentlyShown.push(chosen);
  if (recentlyShown.length > RECENT_WINDOW) recentlyShown.shift();

  return chosen;
}

function buildQuiz() {
  const q = els.search.value.trim().toLowerCase();
  const mode = els.mode.value;
  const limit = Number(els.limit.value);
  const order = els.order.value;

  let filtered = ALL_QUESTIONS.filter(item => {
    const text = (item.question + " " + item.answers.join(" ")).toLowerCase();
    const matchText = !q || text.includes(q);
    const multi = item.solution.filter(Boolean).length > 1;
    const matchMode = mode === 'all' || (mode === 'single' && !multi) || (mode === 'multi' && multi);
    return matchText && matchMode;
  });

  // Bei 'random': erst shuffeln, DANN slicen – sonst werden immer die ersten N
  // Fragen des Arrays (allesamt Datenschutz) ausgewählt und nur ihre Reihenfolge
  // geändert, statt aus dem gesamten Fragenpool zu schöpfen.
  if (order === 'random' || order === 'new' || order === 'retry' || order === 'true_random') {
    filtered = shuffle(filtered);
  }

  if (order === 'new') {
    filtered = filtered.filter(item => {
      const stat = quizStatistics.get(qKey(item));
      return !stat || stat.timesShown === 0;
    });
  }

  if (order === 'retry') {
    filtered = filtered.filter(item => {
      const stat = quizStatistics.get(qKey(item));
      if (!stat || stat.timesShown === 0) return false;
      const successRate = stat.timesCorrect / stat.timesShown;
      return successRate < 1.0;
    });
  }

  if (limit > 0) filtered = filtered.slice(0, limit);

  quiz = filtered;
  queue = (order === 'random' || order === 'new') ? [...filtered] : [...filtered];
  currentItem = null;
  shownCount = 0;
  correct = 0;
  wrong = 0;
  wrongStats = new Map();
  recentlyShown.length = 0; // Anti-Clustering zurücksetzen
  
  // Speichere die Order-Einstellung für nextQuestion
  window.quizOrder = order;
  
  if (!quiz.length) {
    let emptyMsg = 'Keine passenden Fragen gefunden.';
    if (order === 'retry') {
      emptyMsg = 'Keine fehlerhaften Fragen gefunden. Entweder wurden noch keine Fragen beantwortet, oder alle Fragen haben eine Erfolgsquote von 100%.';
    } else if (order === 'new') {
      emptyMsg = 'Keine neuen (noch nie gezeigten) Fragen gefunden.';
    }
    els.question.textContent = emptyMsg;
    els.answers.innerHTML = '';
    els.meta.textContent = '';
    els.result.textContent = '';
    els.checkBtn.classList.add('hidden');
    els.nextBtn.classList.add('hidden');
    els.bar.style.width = '0%';
    updateStats();
    return;
  }
  updateStats();
  nextQuestion();
}

function updateStats() {
  // Berechne Gesamtstatistiken aus quizStatistics
  let totalCorrect = 0;
  let totalWrong = 0;
  
  for (const stat of quizStatistics.values()) {
    totalCorrect += stat.timesCorrect || 0;
    totalWrong += stat.timesWrong || 0;
  }
  
  els.correctCount.textContent = totalCorrect;
  els.wrongCount.textContent = totalWrong;
  els.dueCount.textContent = dueCount();
  const uniqueCount = Array.from(quizStatistics.values())
    .filter(stat => stat.timesShown > 0).length;
  els.uniqueCount.textContent = uniqueCount + ' / ' + ALL_QUESTIONS.length;
  const answered = totalCorrect + totalWrong;
  const total = Math.max(answered + queue.length, 1);
  els.bar.style.width = ((answered / total) * 100) + '%';
}

function getCorrectIndices(item) {
  // Nutze currentSolution wenn vorhanden (nach Randomisierung), sonst Original-Solution
  const solution = item.currentSolution || item.solution;
  return solution.map((v, i) => v ? i : -1).filter(v => v >= 0);
}

function getRandomizedAnswerOrder(item) {
  // Erstelle Array mit Original-Indizes [0, 1, 2, ...]
  const indices = Array.from({length: item.answers.length}, (_, i) => i);
  // Fisher-Yates Shuffle
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  return indices;
}

function renderQuestion() {
  const item = currentItem;
  const key = qKey(item);
  const itemStats = quizStatistics.get(key);
  let wrongText = '';
  if (itemStats && itemStats.timesShown > 0) {
    const correctRate = Math.round(itemStats.timesCorrect / itemStats.timesShown * 100);
    const difficulty = correctRate >= 80 ? '🟢' : correctRate >= 50 ? '🟡' : '🔴';
    wrongText = ` · Erfolgsquote: ${correctRate}% ${difficulty}`;
  }
  els.meta.textContent = `Frage ${shownCount}${wrongText}`;
  els.question.textContent = item.question;
  els.answers.innerHTML = '';
  els.result.textContent = '';
  els.checkBtn.classList.remove('hidden');
  els.nextBtn.classList.add('hidden');

  // Randomisiere Antwortmöglichkeiten
  const answerOrder = getRandomizedAnswerOrder(item);
  
  // Erstelle neue shuffled solution basierend auf answerOrder
  const shuffledSolution = new Array(item.solution.length).fill(0);
  answerOrder.forEach((originalIdx, newIdx) => {
    shuffledSolution[newIdx] = item.solution[originalIdx];
  });
  
  // Speichere die shuffled solution für diese Runde
  item.currentSolution = shuffledSolution;

  answerOrder.forEach((originalIdx, newIdx) => {
    const wrap = document.createElement('label');
    wrap.className = 'answer';

    const input = document.createElement('input');
    input.type = 'checkbox';
    input.name = 'answer';
    input.value = String(newIdx); // Value ist der NEUE Index (shuffled)

    const span = document.createElement('div');
    span.textContent = item.answers[originalIdx];

    wrap.appendChild(input);
    wrap.appendChild(span);
    els.answers.appendChild(wrap);
  });
}

function selected() {
  return Array.from(els.answers.querySelectorAll('input:checked')).map(el => Number(el.value)).sort((a,b)=>a-b);
}

function arraysEqual(a,b) {
  return a.length === b.length && a.every((v,i) => v === b[i]);
}

function markAnswers(showWrong=true) {
  const item = currentItem;
  const c = new Set(getCorrectIndices(item));
  Array.from(els.answers.children).forEach((label, i) => {
    label.classList.remove('correct', 'wrong');
    if (c.has(i)) label.classList.add('correct');
    const input = label.querySelector('input');
    if (showWrong && input.checked && !c.has(i)) label.classList.add('wrong');
  });
}

function checkAnswer(revealOnly=false) {
  if (!currentItem) return;

  const item = currentItem;
  const key = qKey(item);
  const sel = selected();
  const corr = getCorrectIndices(item);
  markAnswers(true);
  els.checkBtn.classList.add('hidden');
  els.nextBtn.classList.remove('hidden');

  // Update statistics
  const prevStats = quizStatistics.get(key) || {timesShown: 0, timesCorrect: 0, timesWrong: 0};
  const isCorrect = arraysEqual(sel, corr);
  
  const newStats = {
    timesShown: prevStats.timesShown + 1,
    timesCorrect: isCorrect ? prevStats.timesCorrect + 1 : prevStats.timesCorrect,
    timesWrong: !isCorrect ? prevStats.timesWrong + 1 : prevStats.timesWrong
  };
  quizStatistics.set(key, newStats);
  
  // Speichere Statistiken in localStorage
  saveStatistics();

  if (revealOnly) {
    els.result.textContent = 'Lösung eingeblendet.';
    return;
  }

  // NEUERUNG: Sofort auf Korrektheit prüfen (nicht erst bei "Lösung zeigen")
  if (isCorrect) {
    correct++;
    els.result.textContent = 'Richtig!';
  } else {
    wrong++;
    const prev = wrongStats.get(key) || {count: 0, dueAt: 0};
    const nextDue = shownCount + (els.spacedWrongToggle.checked ? 3 : 1);
    wrongStats.set(key, {count: prev.count + 1, dueAt: nextDue});
    if (els.repeatWrongToggle.checked) queue.push(item);
    els.result.textContent = `Nicht ganz. Richtig ist: ${corr.map(i => i + 1).join(', ')}. Diese Frage wird später wiederholt.`;
  }
  updateStats();
}

function nextQuestion() {
  if (!queue.length) {
    els.meta.textContent = `Fertig · ${correct + wrong} beantwortet`;
    els.question.textContent = 'Quiz beendet.';
    els.answers.innerHTML = '';
    els.checkBtn.classList.add('hidden');
    els.nextBtn.classList.add('hidden');
    const total = correct + wrong;
    const score = total ? Math.round((correct / total) * 100) : 0;
    els.result.textContent = `Ergebnis: ${correct} richtig, ${wrong} falsch · ${score}%`;
    updateStats();
    return;
  }

  // Phase 3: Intelligente Auswahl der nächsten Frage
  let nextItem = null;
  
  // Schritt 1: Prüfe auf fällige Wiederholungen (Spaced Repetition)
  if (els.repeatWrongToggle.checked) {
    const dueIndex = queue.findIndex(item => {
      const s = wrongStats.get(qKey(item));
      return s && s.dueAt <= shownCount;
    });
    if (dueIndex >= 0) {
      nextItem = queue.splice(dueIndex, 1)[0];
    }
  }
  
  // Schritt 2: Wenn keine fälligen Wiederholungen, nutze Ranking-basierte Auswahl
  if (!nextItem) {
    if (window.quizOrder === 'random' || window.quizOrder === 'retry') {
      // Phase 3: Gewichtete zufällige Auswahl basierend auf Ranking-Scores
      nextItem = selectNextWeightedQuestion(queue);
    } else {
      // Normale sequenzielle Auswahl (Reihenfolge wie in ALL_QUESTIONS)
      nextItem = queue.splice(0, 1)[0];
    }
  }

  if (nextItem) {
    currentItem = nextItem;
    shownCount++;
    updateStats();
    renderQuestion();
  }
}

// Import/Export funktionalität
function exportStatistics() {
  const data = Array.from(quizStatistics.entries());
  return JSON.stringify(data, null, 2);
}

function convertITSMToBSI(itmData) {
  const converted = [];
  
  // ⭐ WrongStats ist die beste Quelle - enthält alle bisherigen Fragen!
  if (itmData.wrongStats && Array.isArray(itmData.wrongStats)) {
    console.log('🎯 Nutze WrongStats als Haupt-Quelle...');
    
    for (const [key, stat] of itmData.wrongStats) {
      // WrongStats Format: [key, {count, dueAt, resolved}]
      // count = wie oft falsch beantwortet
      // resolved = war es gelöst oder nicht
      
      let stats;
      
      if (stat.resolved === true) {
        // Frage wurde gelöst (richtig beantwortet)
        stats = {
          timesShown: (stat.count || 0) + 1,
          timesCorrect: 1,
          timesWrong: stat.count || 0
        };
      } else if (stat.resolved === false) {
        // Frage noch nicht gelöst (noch nicht richtig beantwortet)
        stats = {
          timesShown: stat.count || 1,
          timesCorrect: 0,
          timesWrong: stat.count || 1
        };
      } else {
        // resolved undefined/null = default: wahrscheinlich richtig
        stats = {
          timesShown: (stat.count || 0) + 1,
          timesCorrect: 1,
          timesWrong: stat.count || 0
        };
      }
      
      converted.push([key, stats]);
    }
    
    console.log('✅ WrongStats konvertiert: ' + converted.length + ' Einträge');
    return converted;
  }
  
  // Fallback: Nutze quiz + queue wenn kein wrongStats vorhanden
  console.log('⚠️ Fallback: Nutze quiz + queue...');
  const questionMap = new Map();
  
  if (itmData.quiz && Array.isArray(itmData.quiz)) {
    for (const item of itmData.quiz) {
      if (item.question && item.answers) {
        const key = item.question + "||" + item.answers.join("||");
        if (!questionMap.has(key)) {
          questionMap.set(key, item);
        }
      }
    }
  }
  
  if (itmData.queue && Array.isArray(itmData.queue)) {
    for (const item of itmData.queue) {
      if (item.question && item.answers) {
        const key = item.question + "||" + item.answers.join("||");
        if (!questionMap.has(key)) {
          questionMap.set(key, item);
        }
      }
    }
  }
  
  for (const [key, item] of questionMap) {
    const stats = {
      timesShown: 1,
      timesCorrect: 1,
      timesWrong: 0
    };
    converted.push([key, stats]);
  }
  
  console.log('✅ Quiz+Queue konvertiert: ' + converted.length + ' Einträge');
  return converted;
}

function importStatistics(jsonString) {
  try {
    const imported = JSON.parse(jsonString);
    let mergedCount = 0;
    let newCount = 0;
    let convertedCount = 0;
    
    // Erkenne Format: ITSM-Format oder BSI-Format
    let dataToImport = imported;
    
    // Wenn es ein Objekt mit 'quiz' Property ist (ITSM-Format)
    if (typeof imported === 'object' && imported.quiz && Array.isArray(imported.quiz)) {
      dataToImport = convertITSMToBSI(imported);
      convertedCount = dataToImport.length;
    }
    // Sonst behandle als Array (BSI-Format oder direktes Array)
    else if (!Array.isArray(dataToImport)) {
      // Versuche als Array zu interpretieren
      dataToImport = Array.isArray(imported) ? imported : Object.entries(imported);
    }
    
    for (const entry of dataToImport) {
      const [key, value] = Array.isArray(entry) ? entry : [entry[0], entry[1]];
      
      if (quizStatistics.has(key)) {
        // Existing: merge
        const existing = quizStatistics.get(key);
        existing.timesShown += value.timesShown || 0;
        existing.timesCorrect += value.timesCorrect || 0;
        existing.timesWrong += value.timesWrong || 0;
        mergedCount++;
      } else {
        // New: add
        quizStatistics.set(key, value);
        newCount++;
      }
    }
    
    saveStatistics();
    updateStats();
    
    let message = `✅ Import erfolgreich!\n${mergedCount} Einträge zusammengeführt\n${newCount} neue Einträge hinzugefügt`;
    if (convertedCount > 0) {
      message = `✅ Import erfolgreich! (von ITSM-App)\n${convertedCount} Einträge konvertiert und importiert`;
    }
    alert(message);
  } catch (e) {
    alert('❌ Fehler beim Importieren: ' + e.message);
  }
}
